set  -g default-terminal "screen"
set  -g base-index      1
setw -g pane-base-index 1
set -g status-keys vi
set -g mode-keys   vi
set  -g mouse             on
set  -g focus-events      off
setw -g aggressive-resize off
setw -g clock-mode-style  12
set  -s escape-time       10
set  -g history-limit     50000

